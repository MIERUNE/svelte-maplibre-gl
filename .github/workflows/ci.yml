name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      maplibre_version:
        description: 'maplibre-gl version or dist-tag to test in the v5 compatibility matrix leg'
        required: false
        default: '5'
  schedule:
    # Weekly (Mondays 06:00 UTC) — checks MapLibre GL JS 5.x compatibility even with no repo changes.
    - cron: '0 6 * * 1'

jobs:
  test:
    name: Check + unit (maplibre-gl@${{ matrix.maplibre.label }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: ${{ matrix.maplibre.override }}
    strategy:
      fail-fast: false
      matrix:
        maplibre:
          - label: catalog
            override: false
            version: catalog
          - label: v5
            override: true
            version: ${{ github.event.inputs.maplibre_version || '5' }}
    steps:
      - uses: actions/checkout@v7

      - run: npm i -g --force corepack && corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        if: ${{ !matrix.maplibre.override }}
        run: pnpm install

      - name: Check + unit tests
        if: ${{ !matrix.maplibre.override }}
        run: pnpm run ci:check-unit

      - name: Lint
        if: ${{ !matrix.maplibre.override }}
        run: pnpm run lint

      - name: Check + unit tests with maplibre-gl override
        if: matrix.maplibre.override
        env:
          WITH_MAPLIBRE_SKIP_RESTORE_INSTALL: '1'
        run: node scripts/with-maplibre-version.mjs "${{ matrix.maplibre.version }}" pnpm run ci:check-unit

  e2e:
    name: e2e (maplibre-gl@catalog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - run: npm i -g --force corepack && corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: pnpm exec playwright install-deps chromium

      - name: Run e2e tests
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-catalog
          path: playwright-report/
          retention-days: 7

  e2e-v5:
    name: e2e (maplibre-gl@v5)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - run: npm i -g --force corepack && corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run e2e tests with maplibre-gl override
        env:
          WITH_MAPLIBRE_SKIP_RESTORE_INSTALL: '1'
        run: node scripts/with-maplibre-version.mjs "${{ github.event.inputs.maplibre_version || '5' }}" pnpm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-v5
          path: playwright-report/
          retention-days: 7
